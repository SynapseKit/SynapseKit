name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Before opening, please check if a similar request already exists.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into.
      placeholder: "I'm building a pipeline where I need to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Include a code sketch if helpful.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about or tried?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - RAG / Pipeline
        - Agents
        - Graph Workflows
        - LLM Provider
        - Vector Store
        - Loaders
        - Output Parsers
        - Prompt Templates
        - Observability
        - Other
    validations:
      required: true
