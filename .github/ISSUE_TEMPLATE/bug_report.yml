name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I call rag.ask_sync(), it raises ..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that reproduces the issue.
      render: python
      placeholder: |
        from synapsekit import RAG

        rag = RAG(model="gpt-4o-mini", api_key="sk-...")
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SynapseKit version
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: extras
    attributes:
      label: Installed extras
      description: Which optional packages are installed? (e.g. openai, anthropic, chroma)
      placeholder: "synapsekit[openai,chroma]"
    validations:
      required: false
